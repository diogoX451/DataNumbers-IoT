worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # CORS: só ecoa origens explicitamente permitidas. Para liberar um novo
    # host, acrescente uma linha aqui (ou injete via template do compose).
    map $http_origin $cors_origin {
        default "";
        "http://localhost:3030"  "http://localhost:3030";
        "http://localhost:8080"  "http://localhost:8080";
        "http://127.0.0.1:3030"  "http://127.0.0.1:3030";
    }

    server {
        listen 80;
        server_name localhost;

        # Configuração de Proxy robusta
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Oculta headers de CORS do backend para evitar duplicidade (*, *)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        # Adiciona headers de CORS controlados pelo Nginx.
        # Allow-Credentials só funciona com Origin específica (nunca *).
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
        add_header 'Vary' 'Origin' always;

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Auth API
        location /api/auth/ {
            rewrite ^/api/auth/user/(.*)$ /auth/$1 break;
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://auth-api:3000;
        }

        # Device Manager
        location /api/devices/ {
            proxy_pass http://device-manager:3001/;
        }

        # Gateway EMQX & Stream (WebSocket)
        location /api/stream {
            proxy_pass http://gateway-emqx:3002/api/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Gateway expõe rotas sob /api/... internamente.
        # `proxy_pass .../api/` substitui "/api/gateway/" do request por "/api/".
        location /api/gateway/ {
            proxy_pass http://gateway-emqx:3002/api/;
        }

        # Data Management
        location /api/data/ {
            proxy_pass http://data-management:3003/;
        }

        # Rule Engine
        location /api/rules/ {
            proxy_pass http://rule-engine:3004/;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
