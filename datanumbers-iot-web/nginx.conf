server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — TanStack Router cuida do roteamento client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck local
  location = /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Assets com cache longo (Vite gera hashes únicos no nome do arquivo)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Não cachear o HTML pra novas deploys aparecerem na hora
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
